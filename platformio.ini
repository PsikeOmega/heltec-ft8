[platformio]
default_envs = e213, n16r8, t114

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_upload.use_1200bps_touch = true

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LoRaWAN_DEBUG_LEVEL=0
    -D HELTEC_BOARD=1
    -D SLOW_CLK_TPYE=0
    -D RADIO_NSS=-1
    -D RADIO_DIO_1=-1
    -D RADIO_RESET=-1
    -D LORA_CLK=-1
    -D LORA_MISO=-1
    -D LORA_MOSI=-1
    -D LORA_NSS=-1


lib_deps =
    https://github.com/HelTecAutomation/Heltec_ESP32.git
    adafruit/Adafruit GFX Library

[env:e213]
board = heltec_wifi_lora_32_V3
build_flags =
    ${env.build_flags}
    -D Vision_Master_E213
src_filter =
    +<*>
    -<bsp/n16r8.cpp>

[env:n16r8]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
build_flags =
    ${env.build_flags}
    -D ESP32_S3_N16R8
src_filter =
    +<*>
    -<bsp/vision_master_e213.cpp>
    
[env:t114]
platform = platformio/nordicnrf52@10.11.0
platform_packages =
    platformio/framework-arduinoadafruitnrf52 @ https://github.com/meshtastic/Adafruit_nRF52_Arduino#cpp17-platform
    platformio/toolchain-gccarmnoneeabi@~1.90301.0
framework = arduino
board = heltec_mesh_node_t114
build_type = release
extra_scripts = extra_scripts/nrf52_uf2.py
build_flags =
    ${env.build_flags}
    -D HELTEC_T114

src_filter =
    +<*>
    -<bsp/vision_master_e213.cpp>
    -<bsp/n16r8.cpp>