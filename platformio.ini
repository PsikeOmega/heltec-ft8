[env:heltec-ft8-cat]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
board_upload.use_1200bps_touch = true

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D Vision_Master_E213
    -D LoRaWAN_DEBUG_LEVEL=0
    -D HELTEC_BOARD=1
    -D SLOW_CLK_TPYE=0

    ; Dummy LoRa pins to satisfy unused Heltec library code
    -D RADIO_NSS=-1
    -D RADIO_DIO_1=-1
    -D RADIO_RESET=-1
    -D LORA_CLK=-1
    -D LORA_MISO=-1
    -D LORA_MOSI=-1
    -D LORA_NSS=-1

lib_deps =
    https://github.com/HelTecAutomation/Heltec_ESP32.git
    adafruit/Adafruit GFX Library