name: Build Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install platformio

      - run: pio run

      - uses: actions/upload-artifact@v4
        with:
          name: ft8-heltec-firmware
          path: |
            .pio/build/heltec-ft8-cat/firmware.bin
            .pio/build/heltec-ft8-cat/bootloader.bin
            .pio/build/heltec-ft8-cat/partitions.bin
