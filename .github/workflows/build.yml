name: Build Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        shell: bash
        run: |
          set -o pipefail
          pio run -v 2>&1 | tee build-log.txt
      - name: Show build directory
        if: always()
        run: |
          find .pio/build -maxdepth 2 -type f

      - name: Collect firmware files
        if: always()
        run: |
          mkdir -p dist
          find .pio/build -name bootloader.bin -exec cp {} dist/bootloader.bin \;
          find .pio/build -name partitions.bin -exec cp {} dist/partitions.bin \;
          find .pio/build -name firmware.bin -exec cp {} dist/firmware.bin \;
          cp build-log.txt dist/build-log.txt

      - name: Upload firmware and build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-output
          path: dist/